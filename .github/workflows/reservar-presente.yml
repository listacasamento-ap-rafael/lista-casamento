name: Reservar Presente

on:
  workflow_dispatch:
    inputs:
      id:
        description: "ID do presente"
        required: true
        type: string

permissions:
  contents: write
  
concurrency:
  group: reservar-presentes
  cancel-in-progress: false


jobs:

  reservar:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}


      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20


      - name: Atualizar JSON
        run: |
          node scripts/reservar.js "${{ github.event.inputs.id }}"


      - name: Commit
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/assets/presentes.json

          git diff --cached --quiet && exit 0

          git commit -m "Reserva presente ${{ github.event.inputs.id }}"

          git pull --rebase origin main
            
          git push origin main